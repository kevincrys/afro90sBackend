name: Deploy Lambda (reusable)

on:
  workflow_call:
    inputs:
      github_environment:
        required: true
        type: string
      deploy_env:
        required: true
        type: string
        description: SSM segment (dev|prod)

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test with coverage
        run: npm run test:coverage

      - name: Bundle and package Lambdas
        run: npm run bundle && npm run package:lambda

      - name: Upload lambda zips
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zips
          path: resources/*/lambda.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.github_environment }}
    strategy:
      fail-fast: false
      matrix:
        flow:
          - products-public
          - orders-public
          - products-admin
          - orders-admin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download lambda zips
        uses: actions/download-artifact@v4
        with:
          name: lambda-zips
          path: resources

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy flow
        env:
          ARTIFACT_BUCKET: ${{ vars.ARTIFACT_BUCKET }}
          FLOW: ${{ matrix.flow }}
          GITHUB_SHA: ${{ github.sha }}
        run: bash scripts/deploy-flow.sh "${FLOW}" "${{ inputs.deploy_env }}" "resources/${FLOW}/lambda.zip"

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.github_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Smoke test (API phase 1 + 2, não impeditivo)
        id: smoke
        continue-on-error: true
        env:
          SMOKE_ADMIN_ACCESS_TOKEN: ${{ secrets.SMOKE_ADMIN_ACCESS_TOKEN }}
        run: bash scripts/smoke-test-api-fase2.sh "${{ inputs.deploy_env }}"

      - name: Smoke test — aviso se falhou
        if: steps.smoke.outcome == 'failure'
        run: echo "::warning::Smoke test falhou — deploy concluído; revisar logs do job."
